<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Επαλήθευση Κράτησης — Artistic Minds</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0a;color:#f0ebe0;font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .logo{width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:20px}
  h1{font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:.2em;color:#fff;margin-bottom:32px;text-align:center}
  .card{background:#111;border:1px solid rgba(255,255,255,.1);max-width:400px;width:100%;padding:32px;border-radius:2px}
  .pin-group{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
  label{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4)}
  input{background:#1a1a1a;border:1px solid rgba(255,255,255,.15);color:#fff;padding:12px 16px;font-family:'Outfit',sans-serif;font-size:.95rem;width:100%;outline:none;border-radius:2px}
  input:focus{border-color:rgba(255,255,255,.4)}
  button{width:100%;padding:14px;background:#fff;color:#0a0a0a;font-family:'Outfit',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;border:none;cursor:pointer;border-radius:2px;margin-top:8px;transition:background .2s}
  button:hover{background:#e0e0e0}
  .result{margin-top:24px;padding:20px;border-radius:2px;display:none}
  .result.valid{background:rgba(0,200,100,.08);border:1px solid rgba(0,200,100,.3)}
  .result.invalid{background:rgba(255,50,50,.08);border:1px solid rgba(255,50,50,.3)}
  .result-icon{font-size:2.5rem;text-align:center;margin-bottom:12px}
  .result-title{font-family:'Cinzel',serif;font-size:1.1rem;text-align:center;margin-bottom:16px}
  .result.valid .result-title{color:#00c864}
  .result.invalid .result-title{color:#ff3232}
  .detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.85rem}
  .detail-row:last-child{border-bottom:none}
  .detail-label{color:rgba(255,255,255,.4)}
  .detail-val{color:#fff;font-weight:500}
  .scan-btn{margin-top:8px;background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7)}
  .scan-btn:hover{background:rgba(255,255,255,.05)}
  .pin-saved-notice{font-size:.7rem;color:rgba(0,200,100,.7);letter-spacing:.1em;margin-top:6px;display:none}
  .forget-pin{font-size:.65rem;color:rgba(255,255,255,.25);cursor:pointer;text-decoration:underline;text-align:right;margin-top:4px;display:none}
  .forget-pin:hover{color:rgba(255,100,100,.6)}
  .scanner-wrap{display:none;margin-top:16px;position:relative;border-radius:2px;overflow:hidden;background:#000}
  .scanner-wrap video{width:100%;display:block;height:280px;object-fit:cover}
  .scanner-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .scanner-box{width:200px;height:200px;border:2px solid rgba(255,220,0,.9);border-radius:4px;box-shadow:0 0 0 9999px rgba(0,0,0,.5)}
  .corner{position:absolute;width:20px;height:20px;border-color:rgba(255,220,0,.9);border-style:solid}
  .corner.tl{top:-1px;left:-1px;border-width:3px 0 0 3px}
  .corner.tr{top:-1px;right:-1px;border-width:3px 3px 0 0}
  .corner.bl{bottom:-1px;left:-1px;border-width:0 0 3px 3px}
  .corner.br{bottom:-1px;right:-1px;border-width:0 3px 3px 0}
  .scanner-line{position:absolute;left:50%;transform:translateX(-50%);width:196px;height:2px;background:rgba(255,220,0,.7);animation:scan 2s ease-in-out infinite}
  @keyframes scan{0%,100%{top:calc(50% - 98px)}50%{top:calc(50% + 96px)}}
  .scanner-close{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;pointer-events:all;z-index:10}
  .scanner-hint{font-size:.65rem;color:rgba(255,255,255,.4);text-align:center;margin-top:8px;letter-spacing:.08em;display:none}
</style>
</head>
<body>
  <img src="images/artistic-minds.jpg" alt="Artistic Minds" class="logo"/>
  <h1>ΕΠΑΛΗΘΕΥΣΗ ΚΡΑΤΗΣΗΣ</h1>

  <div class="card">
    <div class="pin-group" id="pinGroup">
      <label>PIN Πρόσβασης</label>
      <input type="password" id="pinInput" placeholder="••••" maxlength="20"/>
      <span class="pin-saved-notice" id="pinSavedNotice">✓ PIN αποθηκευμένο</span>
      <span class="forget-pin" id="forgetPin" onclick="forgetSavedPin()">Αλλαγή PIN</span>
    </div>
    <div class="pin-group">
      <label>Κωδικός Κράτησης</label>
      <input type="text" id="bookingId" placeholder="π.χ. AM-3A389F" style="text-transform:uppercase"/>
    </div>
    <button onclick="verify()">Επαλήθευση →</button>
    <button class="scan-btn" onclick="startScanner()">📷 Σκανάρισμα QR</button>

    <div class="scanner-wrap" id="scannerWrap">
      <video id="scannerVideo" autoplay playsinline muted></video>
      <div class="scanner-overlay">
        <div class="scanner-box" style="position:relative">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
        </div>
        <div class="scanner-line"></div>
      </div>
      <button class="scanner-close" onclick="stopScanner()">✕</button>
    </div>
    <p class="scanner-hint" id="scannerHint">Στόχευσε το QR μέσα στο τετράγωνο</p>

    <div class="result" id="result">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-title" id="resultTitle"></div>
      <div id="resultDetails"></div>
    </div>
  </div>

<script>
const API = 'https://aggelos-manos-barbershop-production.up.railway.app';
const PIN_KEY = 'am_verify_pin';

let scannerStream = null;
let animFrame = null;
let detector = null;

function getSavedPin() { return localStorage.getItem(PIN_KEY) || ''; }
function savePin(pin)  { localStorage.setItem(PIN_KEY, pin); }

function forgetSavedPin() {
  localStorage.removeItem(PIN_KEY);
  const p = document.getElementById('pinInput');
  p.value = ''; p.style.display = 'block';
  document.getElementById('pinSavedNotice').style.display = 'none';
  document.getElementById('forgetPin').style.display = 'none';
  p.focus();
}

window.addEventListener('DOMContentLoaded', () => {
  const saved = getSavedPin();
  if (saved) {
    const p = document.getElementById('pinInput');
    p.value = saved; p.style.display = 'none';
    document.getElementById('pinSavedNotice').style.display = 'block';
    document.getElementById('forgetPin').style.display = 'block';
  }
  const params = new URLSearchParams(window.location.search);
  const idParam = params.get('id');
  if (idParam) {
    document.getElementById('bookingId').value = idParam.toUpperCase();
    if (saved) verify();
  }

  // Ετοιμάζουμε τον BarcodeDetector αν υπάρχει
  if ('BarcodeDetector' in window) {
    detector = new BarcodeDetector({ formats: ['qr_code'] });
  }
});

// ── QR Scanner ──────────────────────────────────────────
async function startScanner() {
  const video = document.getElementById('scannerVideo');
  const wrap  = document.getElementById('scannerWrap');
  const hint  = document.getElementById('scannerHint');

  try {
    scannerStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });
    video.srcObject = scannerStream;
    await video.play();
    wrap.style.display = 'block';
    hint.style.display = 'block';

    if (detector) {
      // BarcodeDetector — native, πολύ αξιόπιστο σε Android Chrome
      scanWithBarcodeDetector(video);
    } else {
      // Fallback: jsQR
      loadJsQR(() => scanWithJsQR(video));
    }
  } catch(e) {
    alert('Δεν επιτράπηκε η πρόσβαση στην κάμερα.');
  }
}

// Μέθοδος 1: BarcodeDetector (Android Chrome, built-in)
async function scanWithBarcodeDetector(video) {
  if (!scannerStream) return;
  try {
    const codes = await detector.detect(video);
    if (codes.length > 0) {
      handleQRResult(codes[0].rawValue);
      return;
    }
  } catch(e) {}
  animFrame = requestAnimationFrame(() => scanWithBarcodeDetector(video));
}

// Μέθοδος 2: jsQR fallback
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

function loadJsQR(cb) {
  if (window.jsQR) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
  s.onload = cb;
  document.head.appendChild(s);
}

function scanWithJsQR(video) {
  if (!scannerStream) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: 'attemptBoth'
    });
    if (code && code.data) {
      handleQRResult(code.data);
      return;
    }
  }
  animFrame = requestAnimationFrame(() => scanWithJsQR(video));
}

function stopScanner() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  if (scannerStream) {
    scannerStream.getTracks().forEach(t => t.stop());
    scannerStream = null;
  }
  document.getElementById('scannerWrap').style.display = 'none';
  document.getElementById('scannerHint').style.display = 'none';
}

function handleQRResult(data) {
  stopScanner();
  try {
    const url = new URL(data);
    const id  = url.searchParams.get('id');
    if (id) {
      document.getElementById('bookingId').value = id.toUpperCase();
      verify(); return;
    }
  } catch(e) {}
  if (/^AM-/i.test(data.trim())) {
    document.getElementById('bookingId').value = data.trim().toUpperCase();
    verify();
  } else {
    alert('Δεν αναγνωρίστηκε έγκυρο QR κράτησης.\n\nΔεδομένα: ' + data);
  }
}

// ── Verify ──────────────────────────────────────────────
async function verify() {
  const pin = document.getElementById('pinInput').value.trim() || getSavedPin();
  const id  = document.getElementById('bookingId').value.trim().toUpperCase();
  if (!pin) { alert('Βάλε PIN πρόσβασης'); return; }
  if (!id)  { alert('Βάλε κωδικό κράτησης'); return; }
  try {
    const res  = await fetch(`${API}/api/verify/${id}?pin=${encodeURIComponent(pin)}`);
    const data = await res.json();
    if (data.valid) {
      savePin(pin);
      document.getElementById('pinInput').style.display = 'none';
      document.getElementById('pinSavedNotice').style.display = 'block';
      document.getElementById('forgetPin').style.display = 'block';
    }
    showResult(data);
  } catch(e) {
    alert('Σφάλμα σύνδεσης. Δοκίμασε ξανά.');
  }
}

function showResult(data) {
  const el = document.getElementById('result');
  el.style.display = 'block';
  if (data.valid) {
    el.className = 'result valid';
    document.getElementById('resultIcon').textContent  = '✅';
    document.getElementById('resultTitle').textContent = 'ΕΓΚΥΡΗ ΚΡΑΤΗΣΗ';
    document.getElementById('resultDetails').innerHTML = `
      <div class="detail-row"><span class="detail-label">Κωδικός</span><span class="detail-val">${data.id}</span></div>
      <div class="detail-row"><span class="detail-label">Όνομα</span><span class="detail-val">${data.name}</span></div>
      <div class="detail-row"><span class="detail-label">Σεμινάριο</span><span class="detail-val">${data.seminar}</span></div>
      <div class="detail-row"><span class="detail-label">Ποσό</span><span class="detail-val">${data.amount}</span></div>
    `;
  } else {
    el.className = 'result invalid';
    document.getElementById('resultIcon').textContent  = '❌';
    document.getElementById('resultTitle').textContent = data.error || 'ΜΗ ΕΓΚΥΡΗ ΚΡΑΤΗΣΗ';
    document.getElementById('resultDetails').innerHTML = data.status
      ? `<div class="detail-row"><span class="detail-label">Status</span><span class="detail-val">${data.status}</span></div>`
      : '';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') verify(); });
</script>
</body>
</html>
